<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(title = ${singlePage != null ? singlePage.spec.title : '朋友们'}, content = ~{::content}, head = ~{::head})}">
<th:block th:fragment="head">
  <link rel="stylesheet" th:href="@{/assets/css/links.css}" />
  
  <style th:inline="css">
    :root {
      /* 卡片动画速度配置 */
      --link-speed: [(${theme.config.links.cardAnimationSpeed + 'ms' ?: '300ms'})];
      --link-curve: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- 核心融合：卡片悬停特效 --- */
    [# th:if="${theme.config.links.enableHoverEffect}"]
    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      transition: 
        transform var(--link-speed) var(--link-curve),
        background-color var(--link-speed) var(--link-curve),
        box-shadow var(--link-speed) var(--link-curve),
        border-color var(--link-speed) var(--link-curve) !important;
      overflow: hidden;
      min-height: 90px;
    }

    /* 头像收缩动画 */
    .link-avatar-wrap {
      width: 65px; 
      height: 65px;
      margin-right: var(--space-3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: 
        width var(--link-speed) var(--link-curve),
        margin var(--link-speed) var(--link-curve),
        opacity var(--link-speed) var(--link-curve),
        transform var(--link-speed) var(--link-curve) !important;
      will-change: width, opacity, transform;
    }

    .link-card:hover .link-avatar-wrap {
      width: 0 !important;
      margin-right: 0 !important;
      opacity: 0 !important;
      transform: scale(0) translateX(-20px);
    }

    /* 描述文字展开动画 */
    .link-desc {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      line-height: 1.5;
      max-height: 1.5em;
      white-space: normal !important;
      overflow: hidden;
      transition: max-height var(--link-speed) var(--link-curve), color var(--link-speed) var(--link-curve) !important;
    }

    .link-card:hover .link-desc {
      -webkit-line-clamp: 2;
      max-height: 3.2em;
      color: rgba(255, 255, 255, 0.9) !important;
    }

    /* 整体卡片变色 */
    .link-card:hover {
      background-color: var(--color-accent) !important;
      border-color: var(--color-accent) !important;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2);
    }

    .link-card:hover .link-name { color: #fff !important; }
    .link-card:hover .link-group-tag {
      color: rgba(255, 255, 255, 0.1) !important;
      -webkit-text-stroke: 0 !important;
      transform: scale(1.1);
    }
    [/]
  </style>

  <script>
    window.LINK_CONFIG = {
      offlineLabel: '[[${theme.config.links?.offlineLabel ?: "失联咯~"}]]'
    };
  </script>
  <script th:src="@{/assets/js/links.js}" defer></script>
</th:block>

<th:block th:fragment="content">
  <main class="main">
    <div class="container">
      <section class="links-hero" data-aos="fade-up">
        <h1 class="links-hero-title" th:text="${singlePage?.spec?.title ?: '朋友们'}">朋友们</h1>
        <p class="links-hero-desc">海内存知己，天涯若比邻</p>
        <div class="links-hero-stats">
            <span class="links-count">已收录 <strong th:text="${#lists.isEmpty(groups) ? 0 : #aggregates.sum(groups.![links.size()])}">0</strong> 位朋友</span>
            <button class="links-random-btn" onclick="visitRandomLink()">随机访问</button>
        </div>
      </section>

      <section class="link-section" data-aos="fade-up">
        <div class="link-grid">
          <th:block th:each="group : ${groups}">
            <a th:each="link : ${group.links}" 
               th:href="${link.spec.url}" 
               class="link-card" 
               data-link 
               target="_blank">
              <div class="link-avatar-wrap">
                <img th:if="${link.spec.logo}" class="link-avatar" th:src="${link.spec.logo}" loading="lazy" />
                <div th:unless="${link.spec.logo}" class="link-avatar-placeholder" th:text="${#strings.substring(link.spec.displayName, 0, 1)}">L</div>
              </div>
              <div class="link-info">
                <span class="link-name" th:text="${link.spec.displayName}">名称</span>
                <span class="link-desc" th:text="${link.spec.description}">描述</span>
              </div>
              <span class="link-group-tag" th:text="${group.spec.displayName}">分组</span>
            </a>
          </th:block>
        </div>
      </section>

      </div>
  </main>

  <div id="linkConfirmModal" class="link-confirm-modal">
    <div class="link-confirm-content">
      <div class="link-confirm-header">
        <span>即将访问：<strong class="link-target-name"></strong></span>
        <button class="link-confirm-close" onclick="closeLinkConfirm()">×</button>
      </div>
      <div class="link-confirm-body">
        <p class="link-warning-text">请注意甄别外部链接信息真伪</p>
        <div class="link-slider-container">
          <div class="link-slider-bg"></div>
          <div class="link-slider-track">
            <div class="link-slider-text">拖动滑块验证</div>
            <div class="link-slider-button">›</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</th:block>
</html>
