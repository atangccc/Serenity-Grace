apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-Serenity
spec:
  displayName: Serenity-Hue
  author:
    name: Serenity-Hue
    website: https://github.com/atangccc/Serenity-Grace
  description: 基于 Serenity-Grace 二次开发的 Halo 博客主题，简约优雅，以樱花粉与湖水蓝为主色调，支持亮色/暗色双主题色配置。
  logo: /themes/theme-Serenity/assets/public/logo.webp
  homepage: https://github.com/atangccc/Serenity-Grace
  repo: https://github.com/atangccc/Serenity-Grace
  issues: https://github.com/atangccc/Serenity-Grace/issues
  license:
    - name: GPL-3.0
      url: LICENSE
  settingName: theme-Serenity-setting
  configMapName: theme-Serenity-configmap
  version: 2.0.4
  requires: ">=2.0.0"
  customTemplates:
    page:
      - name: default
        description: 默认页面
        screenshot: 
        file: page.html
      - name: about
        description: 关于我
        screenshot: 
        file: about.html
      - name: moments
        description: 碎碎念
        screenshot: 
        file: moments.html
      - name: links
        description: 朋友们
        screenshot: 
        file: links.html
      - name: guestbook
        description: 留言板
        screenshot: 
        file: guestbook.html
      - name: projects
        description: 我的项目
        screenshot: 
        file: projects.html
      - name: friends-circle
        description: 朋友圈
        screenshot: 
        file: friends-circle.html
      - name: photos
        description: 图库
        screenshot: 
        file: photos.html
      - name: wishes
        description: 便签墙
        screenshot: 
        file: wishes.html
      - name: equipments
        description: 我的装备
        screenshot: 
        file: equipments.html
    post:
      - name: default
        description: 默认文章
        screenshot: 
        file: post.html
    category:
      - name: default
        description: 默认分类
        screenshot: 
        file: category.html
    tag:
      - name: default
        description: 默认标签
        screenshot: 
        file: tag.html
